<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batarya Stok Takip - Premium</title>
<style>
/* ÖNCEKİ STİLLERİNİN TAMAMI VE EKSİK KALANLAR */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#07090f;color:#e8f0ff;min-height:100vh;overflow-x:hidden;}

.bg-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
.bg-orb1{width:500px;height:500px;top:-120px;left:-120px;background:radial-gradient(circle,rgba(79,168,255,0.16) 0%,transparent 70%);}
.bg-orb2{width:420px;height:420px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(0,212,200,0.14) 0%,transparent 70%);}

/* APP */
.app{position:relative;z-index:1;max-width:1560px;margin:0 auto;padding:0 14px 80px;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 20px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1a6ef5,#00d4c8);display:flex;align-items:center;justify-content:center;font-size:1.1em;}
.logo-text{font-size:1.05em;font-weight:800;color:#a8d4ff;}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.hclock{font-size:0.72em;font-weight:700;letter-spacing:1px;color:rgba(180,200,240,0.65);background:#0d1117;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:7px 11px;}
.hbtn{background:#0d1117;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:rgba(180,200,240,0.65);padding:7px 11px;font-size:0.72em;font-weight:600;cursor:pointer;font-family:inherit;}
.hbtn.red{color:#ff5060;}

/* LAYOUT */
.layout{display:block;}
@media(min-width:1000px){
  .layout{display:flex;gap:20px;align-items:flex-start;}
  .sidebar{width:390px;flex-shrink:0;position:sticky;top:20px;}
  .main-col{flex:1;}
}

/* KARTLAR */
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:16px;margin-bottom:14px;backdrop-filter: blur(10px);}
.clbl{font-size:0.63em;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(140,165,210,0.38);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.pip{width:5px;height:5px;border-radius:50%;background:#4fa8ff;display:inline-block;}

/* METRİKLER */
.metrics{display:flex;gap:6px;margin-bottom:13px;}
.met{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:11px 6px;text-align:center;}
.met-val{font-size:1.5em;font-weight:900;line-height:1;}
.met-lbl{font-size:0.54em;font-weight:700;color:rgba(140,165,210,0.38);text-transform:uppercase;margin-top:4px;}

/* BARLAR & SİPARİŞ */
.bar-item{margin-bottom:9px;}
.bar-bg{height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden;}
.bar-fill{height:100%;transition: width 0.5s ease;}
.order-row{display:flex;justify-content:space-between;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:9px;margin-bottom:5px;font-size: 0.8em;}
.order-qty{color:#00e090;font-weight:800;}

/* BUTONLAR */
.btn{width:100%;padding:13px;border-radius:11px;border:0;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-green{background:linear-gradient(135deg,#00b872,#00e090);color:#001a0f;}
.btn-wa{background:linear-gradient(135deg,#128c3b,#25D366);color:#fff;}

/* TABS & STOK KARTLARI */
.tabs{display:flex;gap:4px;margin-bottom:14px;}
.tbtn{flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:0;cursor:pointer;font-weight:bold;font-size:0.75em;}
.tbtn.active{background:rgba(79,168,255,0.15);color:#4fa8ff;}
.tab{display:none;}.tab.on{display:block;}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:12px;}
.icard{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:16px;}
.inp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.inp{width:100%;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.1);padding:8px;border-radius:6px;color:white;font-weight:bold;}

/* TOAST & OVERLAY */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;background:#111827;border-radius:10px;z-index:1000;transform:translateX(150%);transition:0.3s;}
.toast.on{transform:translateX(0);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:900;display:flex;align-items:center;justify-content:center;}
.overlay.hide{display:none;}
.modal{background:#111827;padding:25px;border-radius:20px;width:90%;max-width:400px;border:1px solid #333;}
</style>
</head>
<body>

<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>
<div id="toast" class="toast"></div>

<div id="tour-overlay" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(5,8,18,0.7);"></div>
<div id="tour-box" style="display:none;position:fixed;z-index:501;bottom:24px;left:50%;transform:translateX(-50%);width:92vw;max-width:420px;background:#111827;border:2px solid #4fa8ff;border-radius:18px;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,0.7);">
  <div id="tour-title" style="font-size:1.1em;font-weight:800;color:#e8f0ff;margin-bottom:7px;"></div>
  <div id="tour-desc" style="font-size:0.85em;color:rgba(180,200,240,0.75);line-height:1.6;margin-bottom:16px;"></div>
  <div style="display:flex;justify-content:space-between;">
    <button onclick="endTour()" style="background:transparent;border:0;color:#777;cursor:pointer;">Atla</button>
    <button id="tour-next-btn" onclick="nextTour()" style="background:#4fa8ff;border:0;padding:8px 20px;border-radius:8px;color:white;font-weight:bold;cursor:pointer;">İleri →</button>
  </div>
</div>
<div id="tour-hl" style="display:none;position:fixed;z-index:499;border-radius:14px;box-shadow:0 0 0 4px #4fa8ff,0 0 30px rgba(79,168,255,0.4);pointer-events:none;"></div>

<div class="app">
  <div class="header" id="el-header">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span class="logo-text">Batarya Stok Takip</span>
    </div>
    <div class="hright">
      <div class="hclock" id="clk">--:--:--</div>
      <button class="hbtn red" onclick="showModal('m-reset')">🗑 Sıfırla</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="card" id="el-verimlilik">
        <div class="clbl"><span class="pip"></span> Stok Verimliliği</div>
        <div class="eff-block">
            <div class="eff-circle">
                <div class="eff-num" id="effNum">0</div><div class="eff-pct">%</div>
            </div>
            <div><div class="etitle" id="effTitle">Hesaplanıyor</div></div>
        </div>
        <div class="metrics">
          <div class="met"><div class="met-val" id="mProd" style="color:#00e090">0</div><div class="met-lbl">Üretilebilir</div></div>
          <div class="met"><div class="met-val" id="mTot" style="color:#4fa8ff">0</div><div class="met-lbl">Toplam KAP</div></div>
        </div>
        <div id="barArea"></div>
      </div>

      <div class="card" id="el-siparis">
        <div class="clbl"><span class="pip g"></span> Sipariş Planı (52 KAP)</div>
        <div id="orderArea"></div>
        <button class="btn btn-wa" onclick="shareWA()">💬 WhatsApp Paylaş</button>
        <button class="btn btn-green" onclick="showModal('m-order')">✅ Stoğa Ekle</button>
      </div>
    </div>

    <div class="main-col">
        <div class="tabs" id="el-tabs">
            <button class="tbtn active" onclick="switchTab('stok', this)">📦 Stok</button>
            <button class="tbtn" onclick="switchTab('hedef', this)">🎯 Hedef</button>
        </div>
        <div id="tab-stok" class="tab on">
            <div class="inv-grid" id="invGrid"></div>
        </div>
        <div id="tab-hedef" class="tab">
            <div class="card">
                <div class="clbl">Hedeflenen Batarya</div>
                <input type="number" id="targetInput" class="inp" value="100" oninput="calculate()">
                <div id="targetArea" style="margin-top:15px;"></div>
            </div>
        </div>
    </div>
  </div>
</div>

<div class="overlay hide" id="m-order">
    <div class="modal">
        <h2>Siparişi Onayla</h2><p>52 KAP stoklara eklenecek. Emin misin?</p>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button class="btn" style="background:#333;color:white" onclick="hideModal('m-order')">Vazgeç</button>
            <button class="btn btn-green" onclick="doOrder()">Onayla</button>
        </div>
    </div>
</div>
<div class="overlay hide" id="m-reset">
    <div class="modal">
        <h2>Sıfırla</h2><p>Tüm veriler silinecek!</p>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button class="btn" style="background:#333;color:white" onclick="hideModal('m-reset')">Vazgeç</button>
            <button class="btn btn-green" style="background:#ff5060" onclick="doReset()">Sıfırla</button>
        </div>
    </div>
</div>

<script>
// 1. VERİ YÖNETİMİ
let state = JSON.parse(localStorage.getItem('bat_v8_final')) || {
  levels: [
    { id: 1, name: 'AE', stock: 40, perBox: 12, perBat: 4, color: '#4fa8ff' },
    { id: 2, name: 'FE', stock: 69, perBox: 6, perBat: 2, color: '#00e090' },
    { id: 3, name: 'GE', stock: 57, perBox: 6, perBat: 3, color: '#ffaa40' }
  ],
  tourDone: false
};

// 2. HESAPLAMA MOTORU (Çift Sayı + 52 KAP Garantili)
function calculate() {
    let rawCaps = state.levels.map(l => (l.stock * l.perBox) / (l.perBat || 1));
    let minProd = Math.floor(Math.min(...rawCaps));
    let totalKAP = state.levels.reduce((s, l) => s + l.stock, 0);

    document.getElementById('mProd').innerText = minProd;
    document.getElementById('mTot').innerText = totalKAP;

    // Verimlilik
    let avg = rawCaps.reduce((a, b) => a + b, 0) / rawCaps.length;
    let eff = Math.round((minProd / avg) * 100) || 0;
    document.getElementById('effNum').innerText = eff;
    document.getElementById('effTitle').innerText = eff > 80 ? "Mükemmel Denge" : "Dengesiz Stok";

    // Bar Grafikleri
    let max = Math.max(...rawCaps);
    let barHTML = '';
    state.levels.forEach((l, i) => {
        let pct = (rawCaps[i] / max) * 100;
        barHTML += `<div class="bar-item">
            <div class="bar-top"><span class="bar-name">${l.name}</span><span class="bar-right">${Math.floor(rawCaps[i])} Batarya</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${l.color}"></div></div>
        </div>`;
    });
    document.getElementById('barArea').innerHTML = barHTML;

    // SİPARİŞ PLANI (ÇİFT SAYI MANTIĞI)
    const target = 52;
    let totalW = state.levels.reduce((s, l) => s + (l.perBat/l.perBox), 0);
    let totalAfter = totalKAP + target;
    let assigned = 0;
    let orderHTML = '';

    state.levels.forEach((l, i) => {
        let order;
        if (i < state.levels.length - 1) {
            let ideal = (totalAfter * ((l.perBat/l.perBox)/totalW)) - l.stock;
            order = Math.max(0, Math.round(ideal / 2) * 2);
            assigned += order;
        } else {
            order = target - assigned; // Kalan sonuncuya (Çift kalır)
        }
        l.lastOrder = order;
        orderHTML += `<div class="order-row"><span>${l.name}</span><span class="order-qty">+${order} KAP</span></div>`;
    });
    document.getElementById('orderArea').innerHTML = orderHTML;

    // Hedef Planlama
    let tVal = document.getElementById('targetInput').value;
    let tHTML = '';
    state.levels.forEach(l => {
        let diff = Math.max(0, Math.ceil((tVal * l.perBat - l.stock * l.perBox) / l.perBox));
        tHTML += `<div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:0.8em"><span>${l.name} İhtiyaç:</span><b>${diff} KAP</b></div>`;
    });
    document.getElementById('targetArea').innerHTML = tHTML;

    localStorage.setItem('bat_v8_final', JSON.stringify(state));
}

// 3. UI KONTROLLERİ
function renderInventory() {
    let html = '';
    state.levels.forEach(l => {
        html += `<div class="icard">
            <div class="icard-top"><b>${l.name}</b><span class="badge b-cap">${l.perBox} Pil/KAP</span></div>
            <div class="inp-grid">
                <div class="inp-wrap"><span class="inp-lbl">Stok</span><input type="number" class="inp" value="${l.stock}" oninput="updateL(${l.id},'stock',this.value)"></div>
                <div class="inp-wrap"><span class="inp-lbl">İhtiyaç</span><input type="number" class="inp" value="${l.perBat}" oninput="updateL(${l.id},'perBat',this.value)"></div>
            </div>
        </div>`;
    });
    document.getElementById('invGrid').innerHTML = html;
}

function updateL(id, f, v) { state.levels.find(x => x.id === id)[f] = parseInt(v) || 0; calculate(); }
function switchTab(id, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('on');
    btn.classList.add('active');
}
function showModal(id) { document.getElementById(id).classList.remove('hide'); }
function hideModal(id) { document.getElementById(id).classList.add('hide'); }

function doOrder() {
    state.levels.forEach(l => l.stock += l.lastOrder);
    renderInventory(); calculate(); hideModal('m-order');
    showToast("Stoklar güncellendi!");
}

function doReset() { localStorage.clear(); location.reload(); }

function showToast(m) {
    let t = document.getElementById('toast');
    t.innerText = m; t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 3000);
}

function shareWA() {
    let txt = `🔋 *BATARYA STOK RAPORU*\n`;
    state.levels.forEach(l => txt += `• ${l.name}: +${l.lastOrder} KAP\n`);
    txt += `🚚 Toplam: 52 KAP`;
    window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
}

// 4. TUR SİSTEMİ (Senin takıldığın yer)
let tourStep = 0;
const tourData = [
    { el: null, title: "Hoş Geldiniz! 🔋", desc: "Bu panel Ford Otosan batarya stoklarını en verimli şekilde yönetmeniz için tasarlandı. Hadi hızlıca tanıyalım." },
    { el: "el-verimlilik", title: "Verimlilik Analizi", desc: "Buradan hangi parçanın üretimi yavaşlattığını ve stok dengenizi görebilirsiniz." },
    { el: "el-siparis", title: "Akıllı Sipariş", desc: "Sistem, her zaman 52 KAP ve çift sayı olacak şekilde en ideal siparişi otomatik hesaplar." },
    { el: "el-tabs", title: "Stok Girişi", desc: "Mevcut stoklarını buradan güncelleyebilir veya hedef planlaması yapabilirsin." }
];

function startTour() {
    if(state.tourDone) return;
    document.getElementById('tour-overlay').style.display = 'block';
    document.getElementById('tour-box').style.display = 'block';
    updateTour();
}

function nextTour() {
    tourStep++;
    if(tourStep >= tourData.length) { endTour(); } else { updateTour(); }
}

function updateTour() {
    let step = tourData[tourStep];
    document.getElementById('tour-title').innerText = step.title;
    document.getElementById('tour-desc').innerText = step.desc;
    
    if(step.el) {
        let target = document.getElementById(step.el);
        let rect = target.getBoundingClientRect();
        let hl = document.getElementById('tour-hl');
        hl.style.display = 'block';
        hl.style.top = (rect.top - 5) + 'px';
        hl.style.left = (rect.left - 5) + 'px';
        hl.style.width = (rect.width + 10) + 'px';
        hl.style.height = (rect.height + 10) + 'px';
        target.scrollIntoView({behavior: 'smooth', block: 'center'});
    } else {
        document.getElementById('tour-hl').style.display = 'none';
    }
}

function endTour() {
    document.getElementById('tour-overlay').style.display = 'none';
    document.getElementById('tour-box').style.display = 'none';
    document.getElementById('tour-hl').style.display = 'none';
    state.tourDone = true;
    localStorage.setItem('bat_v8_final', JSON.stringify(state));
}

// Başlat
setInterval(() => { document.getElementById('clk').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
renderInventory();
calculate();
setTimeout(startTour, 1000);
</script>
</body>
</html>
