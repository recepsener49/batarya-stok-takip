<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lojistik Dashboard v8.0</title>
<style>
/* PREMIUM LIQUID GLASS THEME */
:root {
  --bg: #05070a;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-highlight: rgba(79, 168, 255, 0.15);
  --text: #f0f4f8;
  --text-dim: rgba(240, 244, 248, 0.5);
  --blue: #007aff;
  --cyan: #00d4c8;
  --green: #34c759;
  --orange: #ff9500;
  --red: #ff3b30;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* DYNAMIC BACKGROUND */
body::before {
  content: ''; position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(circle at 15% 20%, rgba(0, 122, 255, 0.1), transparent 40%),
              radial-gradient(circle at 85% 80%, rgba(52, 199, 89, 0.08), transparent 40%);
  filter: blur(100px);
}

.app { max-width: 1400px; margin: 0 auto; padding: 20px; }

/* HEADER */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 15px 10px; border-bottom: 1px solid var(--glass-border); }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--blue), var(--cyan)); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0, 122, 255, 0.3); font-size: 1.2rem; }
.logo-text { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(to right, #fff, var(--text-dim)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* MAIN LAYOUT */
.grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
@media(min-width: 1024px) { .grid { grid-template-columns: 380px 1fr; align-items: start; } .sidebar { position: sticky; top: 20px; } }

/* CARDS */
.glass-card { background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); margin-bottom: 20px; }
.clbl { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
.pip { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); }

/* EFFICIENCY CIRCLE */
.eff-box { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
.eff-circle { position: relative; width: 85px; height: 85px; }
.eff-num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; font-size: 1.3rem; }
.eff-num span { font-size: 0.6rem; color: var(--text-dim); }

/* STATS */
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.met { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 18px; padding: 15px; text-align: center; }
.met-val { font-size: 1.8rem; font-weight: 900; display: block; }
.met-lbl { font-size: 0.6rem; color: var(--text-dim); margin-top: 5px; text-transform: uppercase; }

/* STOK DENGESİ GRAPHIC */
.bar-item { margin-bottom: 18px; }
.bar-top { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
.bar-name { display: flex; align-items: center; gap: 8px; }
.bar-bg { height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
.bar-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: shine 2s infinite; }
@keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

/* ORDER LIST */
.order-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-bottom: 8px; border: 1px solid var(--glass-border); }
.order-qty { color: var(--green); font-weight: 800; font-size: 1.1rem; }

/* BUTTONS */
.btn { width: 100%; padding: 18px; border-radius: 20px; border: none; font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-primary { background: var(--text); color: var(--bg); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
.btn-wa { background: #25D366; color: white; margin-top: 10px; }
.btn:active { transform: scale(0.98); }

/* TABS & INPUTS */
.tabs { display: flex; gap: 5px; background: rgba(255,255,255,0.04); padding: 5px; border-radius: 16px; margin-bottom: 20px; }
.tbtn { flex: 1; padding: 12px; border-radius: 12px; border: none; background: transparent; color: var(--text-dim); font-weight: 700; cursor: pointer; font-size: 0.85rem; }
.tbtn.active { background: var(--glass-highlight); color: var(--text); border: 1px solid var(--glass-border); }
.tab { display: none; } .tab.on { display: block; }

.stock-card { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
.inp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
.inp-wrap label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 6px; }
.inp { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; color: white; font-weight: 700; font-size: 1rem; }

/* MODAL & TOAST */
.overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(3, 5, 10, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: 0.3s; }
.overlay.on { opacity: 1; pointer-events: all; }
.modal { background: #11141a; border: 1px solid var(--glass-border); border-radius: 32px; padding: 30px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }

/* MODERN TOUR SYSTEM */
.tour-box { position: fixed; z-index: 1100; background: #1c212b; border: 1px solid var(--blue); border-radius: 24px; padding: 24px; width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.tour-highlight { position: fixed; z-index: 1050; border-radius: 20px; box-shadow: 0 0 0 100vh rgba(3, 5, 10, 0.85), 0 0 0 4px var(--blue); pointer-events: none; transition: 0.4s; }
</style>
</head>
<body>

<div id="toast" style="position:fixed; top:30px; right:30px; background:#1c212b; padding:15px 25px; border-radius:15px; border-left:4px solid var(--blue); z-index:2000; transform:translateX(200%); transition:0.5s;">Stok Güncellendi</div>

<div id="tour-overlay" style="display:none; position:fixed; inset:0; z-index:1090;"></div>
<div id="tour-box" class="tour-box" style="display:none;">
    <p id="tour-step" style="font-size:0.6rem; color:var(--blue); font-weight:800; text-transform:uppercase; margin-bottom:10px;"></p>
    <h2 id="tour-title" style="font-size:1.1rem; margin-bottom:8px;"></h2>
    <p id="tour-desc" style="font-size:0.85rem; color:var(--text-dim); line-height:1.5; margin-bottom:20px;"></p>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="endTour()" style="background:transparent; border:0; color:var(--text-dim); font-weight:bold; cursor:pointer;">Atla</button>
        <button onclick="nextTour()" id="tour-next-btn" class="btn btn-primary" style="width:auto; padding:10px 20px;">İleri →</button>
    </div>
</div>
<div id="tour-hl" class="tour-highlight" style="display:none;"></div>

<div class="app">
    <header class="header" id="el-header">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <span class="logo-text">Batarya Operasyonu</span>
        </div>
        <div id="clk" style="font-weight:700; color:var(--text-dim); letter-spacing:1px; background:rgba(255,255,255,0.03); padding:8px 15px; border-radius:12px;">00:00:00</div>
    </header>

    <div class="grid">
        <div class="sidebar">
            <div class="glass-card" id="el-verimlilik">
                <div class="clbl"><span class="pip"></span> Stok Performansı</div>
                <div class="eff-box">
                    <div class="eff-circle">
                        <svg viewBox="0 0 85 85" style="transform:rotate(-90deg);">
                            <circle cx="42.5" cy="42.5" r="38" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="7"/>
                            <circle id="effArc" cx="42.5" cy="42.5" r="38" fill="none" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" stroke-dasharray="238" stroke-dashoffset="238" style="transition:0.8s;"/>
                            <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%"><stop offset="0%" style="stop-color:var(--blue);"/><stop offset="100%" style="stop-color:var(--cyan);"/></linearGradient></defs>
                        </svg>
                        <div class="eff-num"><span id="effNum">0</span><span>VERİM</span></div>
                    </div>
                    <div>
                        <h3 id="effTitle" style="font-size:1rem; margin-bottom:4px;">Analiz Ediliyor</h3>
                        <p style="font-size:0.75rem; color:var(--text-dim);">Lojistik dengesi hesaplanıyor.</p>
                    </div>
                </div>
                <div class="metrics">
                    <div class="met"><span class="met-val" id="mProd" style="color:var(--green)">0</span><span class="met-lbl">Üretilebilir</span></div>
                    <div class="met"><span class="met-val" id="mTot" style="color:var(--blue)">0</span><span class="met-lbl">Toplam KAP</span></div>
                </div>
                <div id="barArea"></div>
            </div>

            <div class="glass-card" id="el-siparis">
                <div class="clbl"><span class="pip" style="background:var(--green)"></span> Akıllı Sipariş (52 KAP)</div>
                <div id="orderArea"></div>
                <button class="btn btn-wa" onclick="shareWA()">💬 WHATSAPP İLE PAYLAŞ</button>
                <button class="btn btn-primary" style="margin-top:10px" onclick="showModal('m-order')">✅ SİPARİŞİ STOĞA İŞLE</button>
            </div>
        </div>

        <div class="main-content">
            <div class="tabs" id="el-tabs">
                <button class="tbtn active" onclick="switchTab('stok', this)">📦 ENVANTER</button>
                <button class="tbtn" onclick="switchTab('hedef', this)">🎯 PLANLAMA</button>
            </div>

            <div id="tab-stok" class="tab on">
                <div id="invGrid"></div>
            </div>

            <div id="tab-hedef" class="tab">
                <div class="glass-card">
                    <div class="clbl">Hedeflenen Üretim Sayısı</div>
                    <input type="number" id="targetInput" class="inp" value="100" oninput="calculate()">
                    <div id="targetArea" style="margin-top:20px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="m-order">
    <div class="modal">
        <h2 style="margin-bottom:15px;">Siparişi Onayla</h2>
        <p style="color:var(--text-dim); margin-bottom:25px;">Toplam 52 KAP stoklara eklenecek ve veritabanı güncellenecek.</p>
        <div style="display:flex; gap:12px;">
            <button class="btn" style="background:rgba(255,255,255,0.05); color:white;" onclick="hideModal('m-order')">VAZGEÇ</button>
            <button class="btn btn-primary" onclick="doOrder()">ONAYLA</button>
        </div>
    </div>
</div>

<script>
// STATE YÖNETİMİ
let state = JSON.parse(localStorage.getItem('bat_v8_final')) || {
  levels: [
    { id: 1, name: 'AE', stock: 40, perBox: 12, perBat: 4, color: 'var(--blue)' },
    { id: 2, name: 'FE', stock: 69, perBox: 6, perBat: 2, color: 'var(--green)' },
    { id: 3, name: 'GE', stock: 57, perBox: 6, perBat: 3, color: 'var(--orange)' }
  ],
  tourDone: false
};

// HESAPLAMA MOTORU (ÇİFT SAYI + 52 KAP)
function calculate() {
    let rawCaps = state.levels.map(l => (l.stock * l.perBox) / (l.perBat || 1));
    let minProd = Math.floor(Math.min(...rawCaps));
    let totalKAP = state.levels.reduce((s, l) => s + l.stock, 0);

    document.getElementById('mProd').innerText = minProd;
    document.getElementById('mTot').innerText = totalKAP;

    // VERİMLİLİK HALKASI
    let avg = rawCaps.reduce((a, b) => a + b, 0) / rawCaps.length;
    let eff = Math.round((minProd / avg) * 100) || 0;
    document.getElementById('effNum').innerText = eff;
    document.getElementById('effArc').style.strokeDashoffset = 238 - (238 * eff) / 100;
    document.getElementById('effTitle').innerText = eff > 80 ? "Dengeli Stok" : "Dengesizlik Var";

    // NEON BARLAR
    let max = Math.max(...rawCaps) || 1;
    let barHTML = '';
    state.levels.forEach((l, i) => {
        let pct = (rawCaps[i] / max) * 100;
        barHTML += `<div class="bar-item">
            <div class="bar-top"><span class="bar-name">${l.name}</span><span>${Math.floor(rawCaps[i])} Batarya</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%; background:${l.color}; box-shadow: 0 0 10px ${l.color}"></div></div>
        </div>`;
    });
    document.getElementById('barArea').innerHTML = barHTML;

    // SİPARİŞ PLANI
    const target = 52;
    let totalW = state.levels.reduce((s, l) => s + (l.perBat/l.perBox), 0);
    let totalAfter = totalKAP + target;
    let assigned = 0;
    let orderHTML = '';

    state.levels.forEach((l, i) => {
        let order;
        if (i < state.levels.length - 1) {
            let ideal = (totalAfter * ((l.perBat/l.perBox)/totalW)) - l.stock;
            order = Math.max(0, Math.round(ideal / 2) * 2);
            assigned += order;
        } else {
            order = target - assigned;
        }
        l.lastOrder = order;
        orderHTML += `<div class="order-row"><span>${l.name}</span><span class="order-qty">+${order} KAP</span></div>`;
    });
    document.getElementById('orderArea').innerHTML = orderHTML;

    // HEDEF PLANLAMA
    let tVal = document.getElementById('targetInput').value;
    let tHTML = '';
    state.levels.forEach(l => {
        let diff = Math.max(0, Math.ceil((tVal * l.perBat - l.stock * l.perBox) / l.perBox));
        tHTML += `<div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:0.85rem"><span>${l.name} İçin Gereken:</span><b style="color:var(--orange)">${diff} KAP</b></div>`;
    });
    document.getElementById('targetArea').innerHTML = tHTML;

    localStorage.setItem('bat_v8_final', JSON.stringify(state));
}

function renderInventory() {
    let html = '';
    state.levels.forEach(l => {
        html += `<div class="stock-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b style="font-size:1.3rem;">${l.name}</b>
                <span style="font-size:0.7rem; color:var(--blue); font-weight:700;">${l.stock * l.perBox} PİL</span>
            </div>
            <div class="inp-grid">
                <div class="inp-wrap"><label>STOK (KAP)</label><input type="number" class="inp" value="${l.stock}" oninput="updateL(${l.id},'stock',this.value)"></div>
                <div class="inp-wrap"><label>BİRİM İHTİYAÇ</label><input type="number" class="inp" value="${l.perBat}" oninput="updateL(${l.id},'perBat',this.value)"></div>
            </div>
        </div>`;
    });
    document.getElementById('invGrid').innerHTML = html;
}

function updateL(id, f, v) { state.levels.find(x => x.id === id)[f] = parseInt(v) || 0; calculate(); }
function switchTab(id, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('on');
    btn.classList.add('active');
}
function showModal(id) { document.getElementById(id).classList.add('on'); }
function hideModal(id) { document.getElementById(id).classList.remove('on'); }

function doOrder() {
    state.levels.forEach(l => l.stock += l.lastOrder);
    renderInventory(); calculate(); hideModal('m-order');
    let t = document.getElementById('toast');
    t.style.transform = "translateX(0)";
    setTimeout(() => { t.style.transform = "translateX(200%)"; }, 3000);
}

function shareWA() {
    let txt = `🔋 *BATARYA STOK PLANI*\n`;
    state.levels.forEach(l => txt += `• ${l.name}: +${l.lastOrder} KAP\n`);
    txt += `🚚 *Toplam:* 52 KAP`;
    window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
}

// MODERN TOUR ASİSTANI
let tourStep = 0;
const tourData = [
    { el: null, title: "Lojistik Üssüne Hoş Geldiniz 🔋", desc: "Sizin için modern, akışkan bir dashboard hazırladık. Ford Otosan batarya stoklarını buradan yönetebilirsiniz." },
    { el: "el-verimlilik", title: "Performans Analizi", desc: "Bu halka ve barlar, stoklarınızın birbirine olan dengesini gösterir. Kırmızı barlar üretimi durduran parçalardır." },
    { el: "el-siparis", title: "Hatasız Sipariş", desc: "Artık hesap makinesine gerek yok. Sistem her zaman 52 KAP ve sevkiyata uygun 'Çift Sayı' planı oluşturur." },
    { el: "el-tabs", title: "Veri Girişi", desc: "Stoklarını buradan güncelleyebilir veya hedeflediğin üretime ne kadar kaldığını görebilirsin." }
];

function startTour() {
    if(state.tourDone) return;
    document.getElementById('tour-overlay').style.display = 'block';
    document.getElementById('tour-box').style.display = 'block';
    updateTour();
}

function nextTour() {
    tourStep++;
    if(tourStep >= tourData.length) { endTour(); } else { updateTour(); }
}

function updateTour() {
    let step = tourData[tourStep];
    document.getElementById('tour-step').innerText = `ADIM ${tourStep + 1} / ${tourData.length}`;
    document.getElementById('tour-title').innerText = step.title;
    document.getElementById('tour-desc').innerText = step.desc;
    
    if(step.el) {
        let target = document.getElementById(step.el);
        let rect = target.getBoundingClientRect();
        let hl = document.getElementById('tour-hl');
        hl.style.display = 'block';
        hl.style.top = (rect.top - 10) + 'px';
        hl.style.left = (rect.left - 10) + 'px';
        hl.style.width = (rect.width + 20) + 'px';
        hl.style.height = (rect.height + 20) + 'px';
        target.scrollIntoView({behavior: 'smooth', block: 'center'});
    } else {
        document.getElementById('tour-hl').style.display = 'none';
    }
}

function endTour() {
    document.getElementById('tour-overlay').style.display = 'none';
    document.getElementById('tour-box').style.display = 'none';
    document.getElementById('tour-hl').style.display = 'none';
    state.tourDone = true;
    localStorage.setItem('bat_v8_final', JSON.stringify(state));
}

// BAŞLAT
setInterval(() => { document.getElementById('clk').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);
renderInventory();
calculate();
setTimeout(startTour, 1200);
</script>
</body>
</html>
