<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Batarya Stok Takip v8.1</title>
<style>
:root {
  --bg: #0b0f1a;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.12);
  --glass-glow: rgba(79, 168, 255, 0.25);
  --text: #ffffff;
  --text-dim: #94a3b8;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --green: #10b981;
  --orange: #f59e0b;
  --red: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Inter', -apple-system, sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  min-height: 100vh; 
  background-image: 
    radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.1) 0px, transparent 50%);
}

.app { max-width: 1500px; margin: 0 auto; padding: 25px; }

/* HEADER */
.header { 
  display: flex; justify-content: space-between; align-items: center; 
  margin-bottom: 30px; padding: 20px; 
  background: var(--glass); border-radius: 20px; border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px);
}
.logo-text { font-size: 1.3rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* GRID LAYOUT */
.grid { display: grid; grid-template-columns: 1fr; gap: 25px; }
@media(min-width: 1100px) { .grid { grid-template-columns: 420px 1fr; align-items: start; } .sidebar { position: sticky; top: 25px; } }

/* GLASS CARD */
.glass-card { 
  background: var(--glass); backdrop-filter: blur(20px); 
  border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.3); margin-bottom: 20px;
}
.card-title { font-size: 0.75rem; font-weight: 800; color: var(--cyan); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

/* METRICS */
.met-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.met-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); text-align: center; }
.met-val { font-size: 1.8rem; font-weight: 900; display: block; color: var(--text); }
.met-lbl { font-size: 0.65rem; color: var(--text-dim); margin-top: 5px; }

/* DYNAMIC BARS */
.bar-item { margin-bottom: 15px; }
.bar-info { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
.bar-bg { height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: 0.8s; box-shadow: 0 0 15px var(--glass-glow); }

/* ORDER LIST */
.order-item { 
  display: flex; justify-content: space-between; align-items: center; 
  padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--green);
}
.order-val { color: var(--green); font-weight: 900; font-size: 1.1rem; }

/* BUTTONS */
.btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-primary { background: #fff; color: #000; }
.btn-wa { background: #25D366; color: #fff; margin-top: 10px; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }

/* STOCK CARDS */
.stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
.stock-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; transition: 0.3s; }
.stock-card:hover { border-color: var(--cyan); background: rgba(255,255,255,0.08); }
.stock-name-input { background: transparent; border: none; border-bottom: 2px solid var(--glass-border); color: #fff; font-size: 1.4rem; font-weight: 900; width: 100%; outline: none; margin-bottom: 15px; transition: 0.3s; }
.stock-name-input:focus { border-bottom-color: var(--cyan); }

.inp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.inp-group label { font-size: 0.65rem; color: var(--text-dim); display: block; margin-bottom: 5px; font-weight: 700; }
.inp { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); padding: 12px; border-radius: 10px; color: #fff; font-weight: 700; outline: none; }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal { background: #161b22; border: 1px solid var(--glass-border); border-radius: 24px; padding: 30px; width: 90%; max-width: 400px; text-align: center; }

/* TOUR */
.tour-hl { position: fixed; z-index: 1050; border: 3px solid var(--cyan); border-radius: 20px; box-shadow: 0 0 0 100vh rgba(0,0,0,0.8); pointer-events: none; }
.tour-box { position: fixed; z-index: 1060; background: #1f2937; padding: 20px; border-radius: 18px; width: 300px; border: 1px solid var(--cyan); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="logo-text">⚡ Batarya Stok Takip</div>
    <div id="clk" style="font-weight: 700; font-size: 0.9rem; color: var(--cyan);">00:00:00</div>
  </header>

  <div class="grid">
    <div class="sidebar">
      <div class="glass-card">
        <div class="card-title">📊 Sistem Özeti</div>
        <div class="met-grid">
          <div class="met-box"><span class="met-val" id="m-prod">0</span><span class="met-lbl">ÜRETİLEBİLİR</span></div>
          <div class="met-box"><span class="met-val" id="m-total">0</span><span class="met-lbl">TOPLAM KAP</span></div>
        </div>
        <div id="bar-area"></div>
      </div>

      <div class="glass-card">
        <div class="card-title">📦 Yeni Sipariş Listesi</div>
        <div id="order-list"></div>
        <button class="btn btn-wa" onclick="shareWA()">💬 WHATSAPP İLE PAYLAŞ</button>
        <button class="btn btn-primary" style="margin-top:10px" onclick="openModal()">✅ SİPARİŞİ ONAYLA</button>
      </div>
    </div>

    <div class="main">
      <div class="stock-grid" id="stock-grid"></div>
      
      <div class="glass-card" style="margin-top: 25px;">
        <div class="card-title">🎯 Hedef Planlama</div>
        <div class="inp-group">
          <label>Ulaşılmak İstenen Batarya Sayısı</label>
          <input type="number" id="target-input" class="inp" value="100" oninput="calculate()">
        </div>
        <div id="target-results" style="margin-top: 15px; font-size: 0.9rem;"></div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="modal">
  <div class="modal">
    <h2 style="margin-bottom: 10px;">Siparişi Onayla</h2>
    <p style="color: var(--text-dim); margin-bottom: 25px;">Toplam 52 KAP stoklara eklenecek. Onaylıyor musunuz?</p>
    <div style="display: flex; gap: 10px;">
      <button class="btn" style="background: #333; color: #fff;" onclick="closeModal()">Vazgeç</button>
      <button class="btn btn-primary" onclick="confirmOrder()">Evet, Ekle</button>
    </div>
  </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem('bat_tracker_v81')) || {
  levels: [
    { id: 1, name: 'AE', stock: 40, perBox: 12, perBat: 4, color: '#3b82f6' },
    { id: 2, name: 'FE', stock: 69, perBox: 6, perBat: 2, color: '#10b981' },
    { id: 3, name: 'GE', stock: 57, perBox: 6, perBat: 3, color: '#f59e0b' }
  ]
};

function init() {
  render();
  calculate();
  setInterval(() => {
    document.getElementById('clk').innerText = new Date().toLocaleTimeString('tr-TR');
  }, 1000);
}

function render() {
  const grid = document.getElementById('stock-grid');
  grid.innerHTML = state.levels.map(l => `
    <div class="stock-card">
      <input type="text" class="stock-name-input" value="${l.name}" onchange="updateMeta(${l.id}, 'name', this.value)">
      <div style="font-size: 0.7rem; font-weight: 800; color: var(--cyan); margin-bottom: 15px;">
        ${l.stock} KAP / ${l.stock * l.perBox} PİL MEVCUT
      </div>
      <div class="inp-row">
        <div class="inp-group"><label>STOK (KAP)</label><input type="number" class="inp" value="${l.stock}" oninput="updateMeta(${l.id}, 'stock', this.value)"></div>
        <div class="inp-group"><label>PİL / BATARYA</label><input type="number" class="inp" value="${l.perBat}" oninput="updateMeta(${l.id}, 'perBat', this.value)"></div>
      </div>
    </div>
  `).join('');
}

function updateMeta(id, field, val) {
  let l = state.levels.find(x => x.id === id);
  l[field] = field === 'name' ? val.toUpperCase() : (parseInt(val) || 0);
  calculate();
}

function calculate() {
  let caps = state.levels.map(l => (l.stock * l.perBox) / (l.perBat || 1));
  let minProd = Math.floor(Math.min(...caps));
  let totalKAP = state.levels.reduce((s, l) => s + l.stock, 0);

  document.getElementById('m-prod').innerText = minProd;
  document.getElementById('m-total').innerText = totalKAP;

  // Barlar
  let max = Math.max(...caps) || 1;
  document.getElementById('bar-area').innerHTML = state.levels.map((l, i) => `
    <div class="bar-item">
      <div class="bar-info"><span>${l.name}</span><span>${Math.floor(caps[i])} Batarya</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${(caps[i]/max)*100}%; background:${l.color}"></div></div>
    </div>
  `).join('');

  // SİPARİŞ ALGORİTMASI (52 KAP & ÇİFT SAYI)
  const target = 52;
  let totalW = state.levels.reduce((s, l) => s + (l.perBat/l.perBox), 0);
  let futureTotal = totalKAP + target;
  let assigned = 0;
  
  document.getElementById('order-list').innerHTML = state.levels.map((l, i) => {
    let order;
    if (i < state.levels.length - 1) {
      let ideal = (futureTotal * ((l.perBat/l.perBox)/totalW)) - l.stock;
      order = Math.max(0, Math.round(ideal / 2) * 2);
      assigned += order;
    } else {
      order = target - assigned;
    }
    l.lastOrder = order;
    return `
      <div class="order-item">
        <span style="font-weight:700">${l.name} SEVİYESİ</span>
        <span class="order-val">+${order} KAP</span>
      </div>
    `;
  }).join('');

  // Hedef Planlama
  let targetVal = document.getElementById('target-input').value;
  document.getElementById('target-results').innerHTML = state.levels.map(l => {
    let diff = Math.max(0, Math.ceil((targetVal * l.perBat - l.stock * l.perBox) / l.perBox));
    return `<div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>${l.name} İçin Eksik:</span><b>${diff} KAP</b></div>`;
  }).join('');

  localStorage.setItem('bat_tracker_v81', JSON.stringify(state));
}

function shareWA() {
  const d = new Date().toLocaleDateString('tr-TR');
  let txt = `📦 *SİPARİŞ LİSTESİ* (${d})\n-----------------------\n`;
  state.levels.forEach(l => txt += `• *${l.name}*: ${l.lastOrder} KAP\n`);
  txt += `-----------------------\n*TOPLAM SİPARİŞ:* 52 KAP`;
  window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`);
}

function openModal() { document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function confirmOrder() {
  state.levels.forEach(l => l.stock += l.lastOrder);
  render(); calculate(); closeModal();
}

init();
</script>
</body>
</html>
